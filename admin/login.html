<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台登录 - 中嘉锦铭国际贸易</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #0055b8, #003d8a); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-container { width: 100%; max-width: 420px; padding: 20px; }
    .login-box { background: white; border-radius: 20px; padding: 48px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, #0055b8, #003d8a); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; color: white; font-size: 28px; font-weight: 700; }
    .login-logo h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; }
    .login-logo p { font-size: 14px; color: #666; margin-top: 4px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; color: #1a1a1a; margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 14px 16px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 15px; transition: all 0.3s ease; }
    .form-group input:focus { outline: none; border-color: #0055b8; }
    .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .form-options label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #666; cursor: pointer; }
    .form-options a { font-size: 13px; color: #0055b8; text-decoration: none; }
    .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #0055b8, #003d8a); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.3s ease; }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 85, 184, 0.4); }
    .login-footer { text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid #f0f0f0; }
    .login-footer a { font-size: 14px; color: #666; text-decoration: none; }
    .login-footer a:hover { color: #0055b8; }
    .error-message { background: #fee; color: #c33; padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; display: none; }
    .error-message.active { display: block; }
    @media (max-width: 480px) {
      .login-box { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-logo">
        <div class="logo-icon">L</div>
        <h1>管理后台登录</h1>
        <p>中嘉锦铭国际贸易</p>
      </div>
      
      <div id="errorMessage" class="error-message">用户名或密码错误</div>
      
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" name="password" placeholder="请输入密码" required>
        </div>
        <div class="form-options">
          <label><input type="checkbox"> 记住我</label>
          <a href="#">忘记密码？</a>
        </div>
        <button type="submit" class="login-btn">登录</button>
      </form>
      
      <div class="login-footer">
        <a href="../index.html">← 返回网站首页</a>
      </div>
    </div>
  </div>

  <script>
    // 简单的密码哈希函数（用于本地存储）
    function simpleHash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return hash.toString(16);
    }

    // 初始化欧阳波账号（使用哈希存储密码）
    if (!localStorage.getItem('adminUser')) {
      localStorage.setItem('adminUser', JSON.stringify({
        username: 'admin',
        passwordHash: simpleHash('admin123'),
        name: '欧阳波',
        createdAt: new Date().toISOString()
      }));
    }

    // 登录尝试限制
    let loginAttempts = 0;
    const MAX_ATTEMPTS = 5;
    let lockoutTimer = null;

    async function handleLogin(e) {
      e.preventDefault();
      
      // 检查是否被锁定
      if (loginAttempts >= MAX_ATTEMPTS) {
        showError('登录尝试次数过多，请5分钟后重试');
        return;
      }

      const formData = new FormData(e.target);
      const username = formData.get('username');
      const password = formData.get('password');

      // 显示加载状态
      const btn = e.target.querySelector('.login-btn');
      const originalText = btn.textContent;
      btn.textContent = '登录中...';
      btn.disabled = true;

      // 尝试调用后端认证接口（如果后端实现了 /api/auth/login）
      try {
        const resp = await fetch('http://localhost:3000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        if (resp.ok) {
          const data = await resp.json();
          sessionStorage.setItem('isLoggedIn', 'true');
          if (data && data.name) sessionStorage.setItem('adminName', data.name);
          if (data && data.token) sessionStorage.setItem('adminToken', data.token);
          window.location.href = 'index.html';
          return;
        }
      } catch (err) {
        console.warn('后端登录不可用，使用本地回退验证', err);
      }

      // 本地回退验证
      const adminUser = JSON.parse(localStorage.getItem('adminUser'));
      const passwordHash = simpleHash(password);
      
      if (username === adminUser.username && passwordHash === adminUser.passwordHash) {
        // 重置登录尝试次数
        loginAttempts = 0;
        sessionStorage.setItem('isLoggedIn', 'true');
        sessionStorage.setItem('adminName', adminUser.name);
        sessionStorage.setItem('loginTime', new Date().toISOString());
        window.location.href = 'index.html';
      } else {
        loginAttempts++;
        const remainingAttempts = MAX_ATTEMPTS - loginAttempts;
        if (remainingAttempts <= 0) {
          showError('登录尝试次数过多，请5分钟后重试');
          // 5分钟后重置
          lockoutTimer = setTimeout(() => {
            loginAttempts = 0;
          }, 5 * 60 * 1000);
        } else {
          showError(`用户名或密码错误，还剩 ${remainingAttempts} 次尝试机会`);
        }
        btn.textContent = originalText;
        btn.disabled = false;
      }
    }

    function showError(message) {
      const errorEl = document.getElementById('errorMessage');
      errorEl.textContent = message;
      errorEl.classList.add('active');
      setTimeout(() => {
        errorEl.classList.remove('active');
      }, 5000);
    }

    // 页面加载时检查是否已登录
    if (sessionStorage.getItem('isLoggedIn')) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
